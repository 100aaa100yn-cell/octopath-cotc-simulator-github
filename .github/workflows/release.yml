name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build release archive
        run: |
          mkdir -p dist
          zip -r "dist/octopath-cotc-simulator-${GITHUB_REF_NAME}.zip" .             -x ".git/*" ".github/*" "dist/*"

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*.zip
