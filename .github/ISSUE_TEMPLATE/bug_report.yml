name: Bug report
description: 不具合を報告する
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 何が起きたかを記載してください。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      description: 再現できる手順を番号付きで記載してください。
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期待する動作
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: ブラウザ
      placeholder: Chrome 150 / Windows 11
  - type: input
    id: version
    attributes:
      label: バージョン
      placeholder: v1.2.0
